name: Build and deploy frontend to Azure Web App - app-fe-3tier-prod-g6

on:
  push:
    branches:
      - main
    paths:
      - 'ecommerce-app-frontend/**'
      - '.github/workflows/main_app-fe-3tier-prod-g6.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ecommerce-app-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ecommerce-app-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          CI: false
          REACT_APP_API_URL: https://app-be-3tier-prod-g6.azurewebsites.net/api
        run: npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./ecommerce-app-frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-build

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B1364DFC2DB5493299A7C4D0038E91EA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A9CB042E14CB43428944AED1C31B1FF8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_97B02FEBF4E743C58BC08001C5E79283 }}

      - name: Deploy frontend build to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-fe-3tier-prod-g6'
          slot-name: 'Production'
          package: ./frontend-build
