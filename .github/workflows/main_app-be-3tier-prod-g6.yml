name: Build and deploy backend to Azure Web App - app-be-3tier-prod-g6

on:
  push:
    branches:
      - main
    paths:
      - 'ecommerce-app-backend/**'
      - '.github/workflows/main_app-be-3tier-prod-g6.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ecommerce-app-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ecommerce-app-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests if present
        run: npm test --if-present

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_25E1F83F8BE426193C253181FCFDF3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E65B6798DCFB47FA816014B0F207CA91 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0362A5CBA9843A39ACF946D5285F7FC2 }}

      - name: Deploy backend folder to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-be-3tier-prod-g6'
          slot-name: 'Production'
          package: './ecommerce-app-backend'
