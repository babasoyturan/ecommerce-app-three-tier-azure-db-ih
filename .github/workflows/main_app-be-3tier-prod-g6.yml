name: Build and deploy backend to Azure Web App - app-be-3tier-prod-g6

on:
  push:
    branches:
      - main
    paths:
      - 'ecommerce-app-backend/**'
      - '.github/workflows/main_app-be-3tier-prod-g6.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ecommerce-app-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ecommerce-app-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests if present
        run: npm test -- --passWithNoTests

      - name: Remove dev dependencies
        run: npm prune --omit=dev

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./ecommerce-app-backend

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: ./backend-app

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_25ED1F83F8BE426193C2153181CF2DF3 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E6586798DCFB4F7A861014DAF207CA91 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0362A5CBA9834A39ACC94C6D5285F7C2 }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-be-3tier-prod-g6'
          slot-name: 'Production'
          package: ./backend-app
